name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Wrapper
      run: |
        curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp
        WRAPPER_JAR=$(find /tmp/gradle-8.5 -name "gradle-wrapper*.jar" | head -1)
        echo "Found wrapper jar: $WRAPPER_JAR"
        cp "$WRAPPER_JAR" gradle/wrapper/gradle-wrapper.jar
        chmod +x gradlew
        rm -rf /tmp/gradle*

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
